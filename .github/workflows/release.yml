name: Release

on:
  push:
    tags: ['v*']

jobs:
  docker-release:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            --build-arg VERSION=${{ steps.tag.outputs.TAG }} \
            -t ghcr.io/ericdudley/cashcompass:${{ steps.tag.outputs.TAG }} \
            .

      - name: Push image
        run: |
          docker push ghcr.io/ericdudley/cashcompass:${{ steps.tag.outputs.TAG }}
          docker tag ghcr.io/ericdudley/cashcompass:${{ steps.tag.outputs.TAG }} \
                     ghcr.io/ericdudley/cashcompass:latest
          docker push ghcr.io/ericdudley/cashcompass:latest

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
