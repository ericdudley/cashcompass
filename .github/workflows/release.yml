name: Release

on:
  push:
    tags: ['v*']

jobs:
  docker-release:
    name: Build, Smoke Test, and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            --build-arg VERSION=${{ steps.tag.outputs.TAG }} \
            -t ghcr.io/ericdudley/cashcompass:${{ steps.tag.outputs.TAG }} \
            .

      - name: Smoke test image
        run: |
          mkdir -p /tmp/cashcompass-release-data
          docker run -d --rm \
            --name cashcompass-release-smoke \
            -p 18080:8080 \
            -v /tmp/cashcompass-release-data:/data \
            ghcr.io/ericdudley/cashcompass:${{ steps.tag.outputs.TAG }}

          trap 'docker logs cashcompass-release-smoke; docker stop cashcompass-release-smoke' EXIT

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/healthz >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:18080/healthz
          curl -fsS http://127.0.0.1:18080/dashboard >/dev/null
          test -f /tmp/cashcompass-release-data/cashcompass.db

          docker stop cashcompass-release-smoke
          trap - EXIT

      - name: Push image
        run: |
          docker push ghcr.io/ericdudley/cashcompass:${{ steps.tag.outputs.TAG }}
          docker tag ghcr.io/ericdudley/cashcompass:${{ steps.tag.outputs.TAG }} \
                     ghcr.io/ericdudley/cashcompass:latest
          docker push ghcr.io/ericdudley/cashcompass:latest

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
