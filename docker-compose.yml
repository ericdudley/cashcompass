services:
  server:
    image: ghcr.io/ericdudley/cashcompass-server:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - cashcompass-data:/data
    environment:
      CASHCOMPASS_DB_PATH: /data/cashcompass.db
      CASHCOMPASS_PORT: "8080"

volumes:
  cashcompass-data:
