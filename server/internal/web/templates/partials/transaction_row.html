{{ define "transaction-row" }}
<div id="transaction-{{ .ID }}" data-testid="transaction-row" class="flex items-center gap-4 px-4 py-3 text-sm group hover:bg-slate-800/50">
  <span class="w-24 shrink-0 text-right font-mono font-medium {{ if lt .Amount 0 }}text-red-400{{ else }}text-emerald-400{{ end }}">
    {{ formatCents .Amount }}
  </span>
  <span class="flex-1 text-slate-100">{{ if .Label }}{{ .Label }}{{ else }}<span class="text-slate-500">—</span>{{ end }}</span>
  <span class="w-32 shrink-0 truncate text-slate-400">{{ if .AccountLabel }}{{ .AccountLabel }}{{ else }}—{{ end }}</span>
  <span class="w-28 shrink-0 truncate text-slate-400">{{ if .CategoryLabel }}{{ .CategoryLabel }}{{ else }}—{{ end }}</span>
  <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
    <button
      hx-get="/partials/transactions/{{ .ID }}/edit"
      hx-target="#transaction-{{ .ID }}"
      hx-swap="outerHTML"
      class="text-xs px-2 py-1 bg-slate-700 text-slate-300 rounded hover:bg-slate-600">
      Edit
    </button>
    <button
      hx-delete="/transactions/{{ .ID }}"
      hx-target="#transaction-{{ .ID }}"
      hx-swap="outerHTML"
      hx-confirm="Delete this transaction?"
      class="text-xs px-2 py-1 bg-red-900/50 text-red-400 rounded hover:bg-red-900">
      Delete
    </button>
  </div>
</div>
{{ end }}
