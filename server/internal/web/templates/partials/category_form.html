{{ define "category-form" }}
<form
  class="flex flex-wrap items-end gap-3 rounded-xl border border-slate-700 bg-slate-900/50 p-4"
  hx-post="/categories"
  hx-target="#category-list"
  hx-swap="outerHTML"
  hx-on="htmx:afterRequest: if(event.detail.successful) this.reset()"
>
  <div class="flex flex-col gap-1">
    <label class="text-xs text-slate-400" for="category-label">Label</label>
    <input
      id="category-label"
      type="text"
      name="label"
      required
      placeholder="e.g. Groceries"
      class="rounded-lg border border-slate-600 bg-slate-800 px-3 py-2 text-sm text-slate-100 focus:border-emerald-400 focus:outline-none"
    />
  </div>
  <button
    type="submit"
    class="rounded-full bg-emerald-400 px-5 py-2 text-sm font-semibold text-slate-950 transition hover:bg-emerald-300"
  >Add category</button>
</form>
{{ end }}
