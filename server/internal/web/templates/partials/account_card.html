{{ define "account-card" }}
<div
  id="account-{{ .ID }}"
  data-label="{{ .Label }}"
  data-testid="account-card"
  class="relative rounded-xl border border-emerald-200/20 bg-slate-900/70 p-4 flex flex-col gap-3"
>
  <div class="flex items-start justify-between gap-2">
    <div class="flex flex-col gap-1">
      <p class="text-sm font-medium text-slate-100">{{ .Label }}</p>
      <span class="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-semibold
        {{ if eq .AccountType "net_worth" }}bg-emerald-400/10 text-emerald-400{{ else }}bg-amber-400/10 text-amber-400{{ end }}">
        {{ .AccountType }}
      </span>
    </div>
    <button
      class="rounded p-1 text-slate-400 hover:text-slate-100 hover:bg-slate-700 transition"
      title="Edit label"
      hx-get="/partials/accounts/{{ .ID }}/edit"
      hx-target="#account-{{ .ID }}"
      hx-swap="outerHTML"
    >✎</button>
  </div>

  <div class="flex items-center gap-2 flex-wrap">
    {{ if eq .AccountType "net_worth" }}
    <button
      class="rounded px-2 py-1 text-xs text-slate-400 border border-slate-700 hover:border-amber-400/50 hover:text-amber-400 transition"
      hx-put="/accounts/{{ .ID }}/type"
      hx-vals='{"account_type":"expenses"}'
      hx-target="#account-{{ .ID }}"
      hx-swap="outerHTML"
    >→ expenses</button>
    {{ else }}
    <button
      class="rounded px-2 py-1 text-xs text-slate-400 border border-slate-700 hover:border-emerald-400/50 hover:text-emerald-400 transition"
      hx-put="/accounts/{{ .ID }}/type"
      hx-vals='{"account_type":"net_worth"}'
      hx-target="#account-{{ .ID }}"
      hx-swap="outerHTML"
    >→ net_worth</button>
    {{ end }}

    {{ if .IsArchived }}
    <button
      class="rounded px-2 py-1 text-xs text-slate-400 border border-slate-700 hover:border-emerald-400/50 hover:text-emerald-400 transition"
      title="Unarchive account"
      hx-put="/accounts/{{ .ID }}/archive"
      hx-target="#account-list"
      hx-swap="outerHTML"
    >Unarchive</button>
    {{ else }}
    <button
      class="rounded px-2 py-1 text-xs text-slate-400 border border-slate-700 hover:border-slate-400/50 transition"
      title="Archive account"
      hx-put="/accounts/{{ .ID }}/archive"
      hx-target="#account-list"
      hx-swap="outerHTML"
    >Archive</button>
    {{ end }}

    <button
      class="rounded px-2 py-1 text-xs text-red-400/70 border border-slate-700 hover:border-red-400/50 hover:text-red-400 transition ml-auto"
      hx-delete="/accounts/{{ .ID }}"
      hx-target="#account-{{ .ID }}"
      hx-swap="outerHTML"
      hx-confirm="Delete account '{{ .Label }}'? This cannot be undone."
    >Delete</button>
  </div>
</div>
{{ end }}
