{{ define "transaction-form" }}
<div class="rounded-xl border border-slate-800 bg-slate-900/70 p-4 mb-4">
  <h2 class="text-sm font-semibold text-slate-300 mb-3">Add Transaction</h2>
  <form id="transaction-form"
    hx-post="/transactions"
    hx-target="#transaction-list"
    hx-swap="outerHTML"
    hx-on="htmx:afterRequest: if(event.detail.successful){ var d=this.querySelector('[name=date]').value; this.reset(); this.querySelector('[name=date]').value=d; }"
    class="flex flex-wrap items-end gap-3">
    <input type="hidden" name="account_type" value="{{ .Form.AccountType }}" />
    <div class="flex flex-col gap-1">
      <label class="text-xs text-slate-500">Date</label>
      <input type="date" name="date" value="{{ .Form.Today }}" required
        class="text-sm bg-slate-900 border border-slate-600 text-slate-100 rounded px-2 py-1" />
    </div>
    <div class="flex flex-col gap-1 flex-1 min-w-32">
      <label class="text-xs text-slate-500">Label</label>
      <input type="text" name="label" placeholder="Description" required
        class="text-sm bg-slate-900 border border-slate-600 text-slate-100 rounded px-2 py-1" />
    </div>
    <div class="flex flex-col gap-1">
      <label class="text-xs text-slate-500">Amount</label>
      <div class="flex gap-1">
        <input type="number" name="amount" placeholder="0.00" step="0.01" min="0" required
          class="w-24 text-sm bg-slate-900 border border-slate-600 text-slate-100 rounded px-2 py-1" />
        <select name="amount_mode" class="text-sm bg-slate-900 border border-slate-600 text-slate-100 rounded px-2 py-1">
          <option value="debit">Debit</option>
          <option value="credit">Credit</option>
        </select>
      </div>
    </div>
    <div class="flex flex-col gap-1">
      <label class="text-xs text-slate-500">Account</label>
      <select name="account_id" required class="text-sm bg-slate-900 border border-slate-600 text-slate-100 rounded px-2 py-1">
        {{ range .Form.Accounts }}
        <option value="{{ .ID }}" {{ if eq .ID $.Form.LastAccount }}selected{{ end }}>{{ .Label }}</option>
        {{ end }}
      </select>
    </div>
    <div class="flex flex-col gap-1">
      <label class="text-xs text-slate-500">Category</label>
      <select name="category_id" class="text-sm bg-slate-900 border border-slate-600 text-slate-100 rounded px-2 py-1">
        <option value="0">None</option>
        {{ range .Form.Categories }}
        <option value="{{ .ID }}">{{ .Label }}</option>
        {{ end }}
      </select>
    </div>
    <button type="submit" class="px-3 py-1.5 bg-emerald-600 text-white text-sm rounded hover:bg-emerald-700">
      Add
    </button>
  </form>
</div>
{{ end }}
