{{ define "category-card" }}
<div
  id="category-{{ .ID }}"
  data-label="{{ .Label }}"
  data-testid="category-card"
  class="relative rounded-xl border border-emerald-200/20 bg-slate-900/70 p-4 flex flex-col gap-3"
>
  <div class="flex items-start justify-between gap-2">
    <p class="text-sm font-medium text-slate-100">{{ .Label }}</p>
    <button
      class="rounded p-1 text-slate-400 hover:text-slate-100 hover:bg-slate-700 transition"
      title="Edit label"
      hx-get="/partials/categories/{{ .ID }}/edit"
      hx-target="#category-{{ .ID }}"
      hx-swap="outerHTML"
    >✎</button>
  </div>

  <div class="flex items-center gap-2">
    <button
      class="rounded px-2 py-1 text-xs text-red-400/70 border border-slate-700 hover:border-red-400/50 hover:text-red-400 transition ml-auto"
      hx-delete="/categories/{{ .ID }}"
      hx-target="#category-{{ .ID }}"
      hx-swap="outerHTML"
      hx-confirm="Delete category '{{ .Label }}'? This cannot be undone."
    >Delete</button>
  </div>
</div>
{{ end }}
